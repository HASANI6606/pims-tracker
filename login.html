<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIMS - Secure Admin Portal Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">

    <main class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-emerald-400 tracking-tight">PIMS Security Gate</h1>
            <p class="text-sm text-gray-400 mt-1">Authorized Clinical Administration Personnel Only</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Staff Email Address</label>
                <input type="email" id="emailInput" required class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 font-medium transition text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Security Password</label>
                <input type="password" id="passwordInput" required class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 font-medium transition text-sm">
            </div>
            
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-emerald-900/20 transition-all text-sm mt-2">
                Authenticate Account
            </button>
        </form>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBEC4xARqZ0CZSNLhlVLjid8UxuyY3E5KI",
            authDomain: "pims-pharmaceutical.firebaseapp.com",
            databaseURL: "https://pims-pharmaceutical-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pims-pharmaceutical",
            storageBucket: "pims-pharmaceutical.firebasestorage.app",
            messagingSenderId: "996269903404",
            appId: "1:996269903404:web:9d257e2644f1a571ea4b89",
            measurementId: "G-1BR530YXWK"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;

    // 1. FORCE THE ACCORDION GATE TO DROP THE SECOND THE TAB IS CLOSED
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION)
        .then(() => {
            // 2. This executes immediately after session-only persistence is enforced
            return firebase.auth().signInWithEmailAndPassword(email, password);
        })
        .then((userCredential) => {
            const user = userCredential.user;

            // 3. Verify user role assignment inside the database ledger
            return database.ref('users/' + user.uid).once('value');
        })
        .then((snapshot) => {
            const userData = snapshot.val();

            if (userData && userData.role === "ADMIN") {
                // Perfect Match: Pass forward and overwrite history history state 
                window.location.replace("admin.html");
            } else {
                // User is authenticated but lacks admin permission role flags
                firebase.auth().signOut().then(() => {
                    alert("Access Forbidden: Your account profile does not possess administrator clearance.");
                });
            }
        })
        .catch((error) => {
            alert("Authentication Refused: " + error.message);
        });
});
    
    </script>
</body>
</html>
